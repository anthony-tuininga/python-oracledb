name: build

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          cache: 'pip'
          python-version: 3.12

      - name: build sdist
        run: |
          python -m pip install setuptools
          python setup.py sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  build_linux_x86_64_wheels:
    name: Build wheels on Linux
    runs-on: ubuntu-latest
    needs: build_sdist
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64
      env:
        PYO_COMPILE_ARGS: -g0
      volumes:
        - my_docker_volume:/volume_mount

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: build

      - name: Build wheels
        run: |
          ls
          (cd build && ls)
          /opt/python/cp312-cp312/bin/python3.12 -m build
          (cd dist && auditwheel repair *.whl)

      - name: Upload the artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-oracledb-${{ matrix.os }}-${{ matrix.python-version }}
          path: wheelhouse
