name: build

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:

  build_linux_wheels:
    name: Build wheels for Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: amd64
            container: quay.io/pypa/manylinux_2_28_x86_64
          - platform: arm64
            container: quay.io/pypa/manylinux_2_28_aarch64

    steps:

      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Generate script
        run: |
          echo export PYO_COMPILE_ARGS=-g0 > build.sh
          echo echo X >> build.sh
          echo /opt/python/cp312-cp312/bin/python3.12 -m build >> build.sh
          echo cd dist >> build.sh
          echo auditwheel repair *.whl >> build.sh
          chmod +x build.sh

      - name: Build wheels
        run: |
          docker run \
            -v $(pwd):/io  \
            -w /io \
            --platform linux/${{ matrix.platform }} \
            ${{ matrix.container }} \
            ./build.sh

      - name: Upload the artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux_${{ matrix.platform }}_wheels
          path: dist/wheelhouse
