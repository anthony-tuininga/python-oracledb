name: build

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:

  build_linux_wheels:
    name: Build wheels for Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - platform: arm64
        image:
          - container: quay.io/pypa/manylinux_2_28_aarch64

    steps:

      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.arch.platform }}

      - name: Generate script
        run: |
          echo pwd > build.sh
          echo echo X >> build.sh
          echo ls /opt >> build.sh
          chmod +x build.sh

      - name: Build wheels
        run: |
          docker run \
            -v $(pwd):/io  \
            -w /io \
            --platform linux/${{ matrix.arch.platform }} \
            ${{ matrix.image.container }} \
            build.sh

      - name: Upload the artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux_${{ matrix.arch.platform }}_wheels
          path: dist/wheelhouse
