name: build

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  build_linux_x86_64_wheels:
    name: Build wheels on Linux x86_64
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64
      env:
        PYO_COMPILE_ARGS: -g0
      volumes:
        - my_docker_volume:/volume_mount

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build wheels
        run: |
          ls
          /opt/python/cp312-cp312/bin/python3.12 -m build
          (cd dist && auditwheel repair *.whl)

      - name: Upload the artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-oracledb-${{ matrix.os }}-${{ matrix.python-version }}
          path: wheelhouse
